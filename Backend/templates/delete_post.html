{% extends "base.html" %}

{% block title %}Delete Post{% endblock title %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm border-danger">
      <div class="card-header bg-danger text-white">
        <h4 class="mb-0">Confirm Deletion</h4>
      </div>
      <div class="card-body">
        <p>Are you sure you want to delete the post "<strong>{{ post.title }}</strong>"?</p>
        <p class="text-muted">This action cannot be undone.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex justify-content-between">
            <a href="{% url 'post_detail' post.pk %}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-danger">Delete Post</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
