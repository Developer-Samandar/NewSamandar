<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Navigation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2d3748;
            --accent-color: #3182ce;
            --light-bg: #f7fafc;
            --text-light: #ffffff;
            --text-dark: #2d3748;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-bg);
        }

        .navbar {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            transition: var(--transition);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-light) !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
        }

        .navbar-brand:hover {
            transform: scale(1.02);
            color: var(--accent-color) !important;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.9) !important;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
            padding: 0.75rem 1rem;
        }

        .nav-link:hover {
            color: var(--text-light) !important;
            transform: translateY(-1px);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 50%;
            background-color: var(--accent-color);
            transition: var(--transition);
            transform: translateX(-50%);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .btn-custom {
            border-radius: 8px;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: var(--shadow);
            border: none;
        }

        .btn-outline-light {
            border-color: rgba(255, 255, 255, 0.3);
            color: var(--text-light);
        }

        .btn-outline-light:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--text-light);
            color: var(--text-light);
        }

        .btn-primary-custom {
            background: linear-gradient(45deg, var(--accent-color), #63b3ed);
            color: var(--text-light);
        }

        .btn-primary-custom:hover {
            background: linear-gradient(45deg, #63b3ed, var(--accent-color));
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(49, 130, 206, 0.3);
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            transition: var(--transition);
            color: var(--text-light);
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-bar:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 0 0.2rem rgba(255, 255, 255, 0.25);
            color: var(--text-light);
        }

        .offcanvas {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: var(--text-light);
            width: 300px;
        }

        .offcanvas .list-group-item {
            background: transparent;
            border: none;
            color: var(--text-light);
            transition: var(--transition);
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .offcanvas .list-group-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
            color: var(--accent-color);
        }

        .dark-mode-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-light);
            transition: var(--transition);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dark-mode-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .dropdown-divider {
            border-color: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 991.98px) {
            .navbar-collapse {
                background: rgba(0, 0, 0, 0.05);
                border-radius: 12px;
                margin-top: 1rem;
                padding: 1rem;
                backdrop-filter: blur(10px);
            }
        }

        /* Dark mode styles */
        body.dark-mode {
            background-color: var(--secondary-color);
            color: var(--text-light);
        }

        body.dark-mode .navbar {
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
        }

        body.dark-mode .offcanvas {
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top" role="navigation" aria-label="Main navigation">
    <div class="container-fluid">
        <!-- Brand -->
        <a class="navbar-brand d-flex align-items-center" href="/" aria-label="OnlineShop Home">
            <i class="bi bi-cart4 fs-2 me-2" aria-hidden="true"></i>
            <span>Online<span class="fw-light">Shop</span></span>
        </a>

        <!-- Toggler -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#categoriesOffcanvas" aria-controls="categoriesOffcanvas" aria-label="Toggle categories menu">
            <i class="bi bi-list-nested fs-3" aria-hidden="true"></i>
        </button>

        <!-- Navbar Links -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-bs-toggle="offcanvas" data-bs-target="#categoriesOffcanvas" aria-label="Open categories">Categories</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'posts' %}">Posts</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'about' %}">About</a>
                </li>
            </ul>

            <!-- Search Bar -->
            <form class="d-flex me-3" role="search">
                <input class="form-control search-bar me-2" type="search" placeholder="Search products..." aria-label="Search for products">
                <button class="btn btn-outline-light btn-custom" type="submit" aria-label="Submit search">
                    <i class="bi bi-search" aria-hidden="true"></i>
                </button>
            </form>

            <!-- Dark Mode Toggle -->
            <button id="darkModeToggle" class="btn dark-mode-toggle me-3" title="Toggle dark mode" aria-label="Toggle dark mode">
                <i class="bi bi-moon-stars-fill" aria-hidden="true"></i>
            </button>

            <!-- User Actions -->
            <div class="d-flex gap-2">
                <a href="#" class="btn btn-outline-light btn-custom px-4" aria-label="Login to your account">Login</a>
                <a href="#" class="btn btn-primary-custom btn-custom px-4" aria-label="Create new account">Sign Up</a>
            </div>
        </div>
    </div>
</nav>

<!-- Offcanvas for Categories -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="categoriesOffcanvas" aria-labelledby="categoriesLabel">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title fw-bold" id="categoriesLabel">
            <i class="bi bi-tags me-2" aria-hidden="true"></i>Explore Categories
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close categories menu"></button>
    </div>
    <div class="offcanvas-body">
        <div class="list-group">
            <a href="#" class="list-group-item list-group-item-action py-3" aria-label="Browse electronics">
                <i class="bi bi-cpu me-3 fs-5" aria-hidden="true"></i>Electronics
            </a>
            <a href="#" class="list-group-item list-group-item-action py-3" aria-label="Browse clothing and fashion">
                <i class="bi bi-scissors me-3 fs-5" aria-hidden="true"></i>Clothing & Fashion
            </a>
            <a href="#" class="list-group-item list-group-item-action py-3" aria-label="Browse home and garden">
                <i class="bi bi-house-heart me-3 fs-5" aria-hidden="true"></i>Home & Garden
            </a>
            <a href="#" class="list-group-item list-group-item-action py-3" aria-label="Browse health and beauty">
                <i class="bi bi-heart-pulse me-3 fs-5" aria-hidden="true"></i>Health & Beauty
            </a>
            <a href="#" class="list-group-item list-group-item-action py-3" aria-label="Browse sports and outdoors">
                <i class="bi bi-controller me-3 fs-5" aria-hidden="true"></i>Sports & Outdoors
            </a>
            <div class="dropdown-divider my-3"></div>
            <a href="#" class="list-group-item list-group-item-action py-3 fw-bold" aria-label="View all categories">
                <i class="bi bi-grid me-3" aria-hidden="true"></i>View All Categories
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Dark Mode Toggle
    const toggle = document.getElementById('darkModeToggle');
    const body = document.body;
    const navbar = document.querySelector('.navbar');

    // Check for saved dark mode preference
    if (localStorage.getItem('darkMode') === 'enabled') {
        body.classList.add('dark-mode');
        toggle.innerHTML = '<i class="bi bi-sun-fill" aria-hidden="true"></i>';
        toggle.setAttribute('aria-label', 'Switch to light mode');
    }

    toggle.addEventListener('click', () => {
        body.classList.toggle('dark-mode');

        if (body.classList.contains('dark-mode')) {
            localStorage.setItem('darkMode', 'enabled');
            toggle.innerHTML = '<i class="bi bi-sun-fill" aria-hidden="true"></i>';
            toggle.setAttribute('aria-label', 'Switch to light mode');
        } else {
            localStorage.setItem('darkMode', 'disabled');
            toggle.innerHTML = '<i class="bi bi-moon-stars-fill" aria-hidden="true"></i>';
            toggle.setAttribute('aria-label', 'Switch to dark mode');
        }
    });

    // Smooth scroll for nav links (if needed)
    document.querySelectorAll('.nav-link[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) {
                target.scrollIntoView({
                    behavior: 'smooth'
                });
            }
        });
    });
</script>

</body>
</html>
